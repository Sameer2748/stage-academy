version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: stage-academy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: stageacademy
      POSTGRES_PASSWORD: stageacademy123
      POSTGRES_DB: stageacademy
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
